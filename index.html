<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>🎂 Operation: Make Disha Laugh</title>

<link rel="stylesheet" href="style.css">

<body>

<div id="moon"></div>

<section id="intro" class="page active">

<p id="introText">

</button>

<div class="card">

<p>

</p>

<div class="gifts">

<div class="gift" data-good="0">

🎁

</div>

<div class="gift" data-good="1">

🎁

</div>

<div class="gift" data-good="0">

🎁

</div>

</div>

<section id="mission3" class="page">

<div class="progress">

<div id="bar"></div>

</div>

<p id="scan">

Preparing Scanner...

</p>

</div>

</section>

<h1>

🎂 HAPPY BIRTHDAY DISHA ❤️
